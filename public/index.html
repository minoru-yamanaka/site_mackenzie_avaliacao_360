<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Formulários | Início</title>
    <meta name="description" content="Selecione um formulário ativo para responder.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
        }
        .hero {
            background: var(--primary);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
        }
        .hero h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .search-container {
            max-width: 1200px;
            margin: 2rem auto 0.5rem;
            padding: 0 1.5rem;
        }
        .search-bar-unified {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
            background: var(--surface);
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 2px solid var(--border);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-bar-unified:focus-within {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(177, 12, 41, 0.15) !important;
        }
        @media (max-width: 992px) {
            .filter-divider { display: none !important; }
            .search-bar-unified { border-radius: var(--radius) !important; padding: 1rem !important; }
        }
        .forms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .public-form-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            border-top: 4px solid var(--primary);
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            min-height: 340px;
            justify-content: space-between;
        }
        .public-form-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .form-card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 3.2rem;
        }
        .form-card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 4rem;
        }
        .form-card-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            border-top: 1px solid var(--border);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">Portal de Formulários</a>
        <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('active')">&#9776;</button>
        <div class="nav-links d-flex align-center" id="navLinks">
            <a href="/" style="margin-right: 1rem;">Formulários Disponíveis</a>
            <a href="/mural.html" style="margin-right: 1rem;">Mural de Avisos</a>
            <a href="/fale-conosco.html" style="margin-right: 1rem;">Enviar Mensagem</a>
            <div id="authLinks">
                <a href="/login.html" class="btn btn-secondary" style="padding: 0.5rem 1.25rem; color: white;">Acesso Docente</a>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <div class="hero">
        <h1>Mackenzie 360° | Hub de Avaliação Acadêmica</h1>
        <p>Selecione um dos formulários ativos abaixo para registrar sua resposta.</p>
    </div>

    <!-- BUSCA E FILTROS INTEGRADOS EM UMA ÚNICA BARRA -->
    <div class="search-container">
        <div class="search-bar-unified">
            <!-- Campo de Busca por Texto -->
            <div style="display: flex; align-items: center; gap: 0.5rem; flex: 2 1 220px;">
                <span style="font-size: 1.1rem; user-select: none;">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar formulário" style="width: 100%; border: none; outline: none; font-family: inherit; font-size: 0.95rem; font-weight: 500; background: transparent; padding: 0.4rem 0;">
            </div>
            
            <!-- Divisória sutil -->
            <div class="filter-divider" style="width: 1px; height: 28px; background-color: var(--border);"></div>
            
            <!-- Filtro de Status Temporal -->
            <div class="filter-item" style="display: flex; align-items: center; gap: 0.35rem; flex: 1 1 150px;">
                <span style="font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; white-space: nowrap;">Status:</span>
                <select id="filterStatus" style="border: 1px solid var(--border); border-radius: 8px; padding: 0 0.5rem; font-size: 0.8rem; outline: none; width: 100%; height: 32px; background: white; font-family: inherit; color: var(--text-main); cursor: pointer;">
                    <option value="">Todos</option>
                    <option value="abertos" selected>Abertos</option>
                    <option value="fechados">Fechados</option>
                </select>
            </div>

            <!-- Filtro de Avaliador -->
            <div class="filter-item" style="display: flex; align-items: center; gap: 0.35rem; flex: 1 1 160px;">
                <span style="font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; white-space: nowrap;">Avaliador:</span>
                <select id="filterEvaluator" style="border: 1px solid var(--border); border-radius: 8px; padding: 0 0.5rem; font-size: 0.8rem; outline: none; width: 100%; height: 32px; background: white; font-family: inherit; color: var(--text-main); cursor: pointer;">
                    <option value="">Todos</option>
                </select>
            </div>

            <!-- Filtro de Avaliado -->
            <div class="filter-item" style="display: flex; align-items: center; gap: 0.35rem; flex: 1 1 160px;">
                <span style="font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; white-space: nowrap;">Avaliado:</span>
                <select id="filterEvaluated" style="border: 1px solid var(--border); border-radius: 8px; padding: 0 0.5rem; font-size: 0.8rem; outline: none; width: 100%; height: 32px; background: white; font-family: inherit; color: var(--text-main); cursor: pointer;">
                    <option value="">Todos</option>
                </select>
            </div>
        </div>
    </div>

    <!-- GRID DE FORMULÁRIOS -->
    <div class="container" style="max-width: 1200px; padding-bottom: 4rem;">
        <div id="alertMessage" class="alert"></div>
        
        <div id="formsGrid" class="forms-grid">
            <div class="empty-state">
                <div class="loader"></div>
                <p style="margin-top: 1rem;">Carregando formulários disponíveis...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Verifica se está logado para adaptar botões da navbar
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (token && user) {
                document.getElementById('authLinks').innerHTML = `
                    <span style="color: white; margin-right: 1rem; font-weight: 500;">Olá, ${user.name}</span>
                    <a href="/dashboard.html" class="btn btn-secondary" style="padding: 0.5rem 1.25rem; color: white; margin-right: 0.5rem;">Ir para Painel</a>
                    <button onclick="logout()" class="btn btn-danger" style="padding: 0.5rem 1rem;">Sair</button>
                `;
            }

            let allForms = [];
            loadPublicForms();

            document.getElementById('searchInput').addEventListener('input', renderForms);
            document.getElementById('filterStatus').addEventListener('change', renderForms);
            document.getElementById('filterEvaluator').addEventListener('change', renderForms);
            document.getElementById('filterEvaluated').addEventListener('change', renderForms);

            async function loadPublicForms() {
                try {
                    const res = await fetch('/api/public/forms');
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Erro ao carregar.');
                    allForms = data;
                    
                    // Popular os filtros de Avaliador e Avaliado dinamicamente
                    populateFilterSelects(data);
                    
                    renderForms();
                } catch (e) {
                    document.getElementById('formsGrid').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⚠️</div>
                            <p>${e.message}</p>
                        </div>
                    `;
                }
            }

            function populateFilterSelects(forms) {
                const evaluators = new Set();
                const evaluateds = new Set();
                
                forms.forEach(f => {
                    if (f.evaluator_type) evaluators.add(f.evaluator_type.trim());
                    if (f.evaluated_type) evaluateds.add(f.evaluated_type.trim());
                });
                
                const evaluatorSelect = document.getElementById('filterEvaluator');
                evaluators.forEach(ev => {
                    const opt = document.createElement('option');
                    opt.value = ev;
                    opt.textContent = ev;
                    evaluatorSelect.appendChild(opt);
                });
                
                const evaluatedSelect = document.getElementById('filterEvaluated');
                evaluateds.forEach(ev => {
                    const opt = document.createElement('option');
                    opt.value = ev;
                    opt.textContent = ev;
                    evaluatedSelect.appendChild(opt);
                });
            }

            function renderForms() {
                const search = document.getElementById('searchInput').value.toLowerCase().trim();
                const filterStatus = document.getElementById('filterStatus').value;
                const filterEvaluator = document.getElementById('filterEvaluator').value;
                const filterEvaluated = document.getElementById('filterEvaluated').value;

                const now = new Date();

                const filtered = allForms.filter(f => {
                    const matchesSearch = f.title.toLowerCase().includes(search) || 
                                          (f.description && f.description.toLowerCase().includes(search));
                    
                    let matchesStatus = true;
                    if (filterStatus === 'abertos') {
                        const started = !f.start_date || new Date(f.start_date) <= now;
                        const notExpired = !f.deadline || new Date(f.deadline) >= now;
                        matchesStatus = started && notExpired;
                    } else if (filterStatus === 'fechados') {
                        const expired = f.deadline && new Date(f.deadline) < now;
                        const notStarted = f.start_date && new Date(f.start_date) > now;
                        matchesStatus = expired || notStarted;
                    }

                    let matchesEvaluator = true;
                    if (filterEvaluator) {
                        matchesEvaluator = f.evaluator_type && f.evaluator_type.trim() === filterEvaluator;
                    }

                    let matchesEvaluated = true;
                    if (filterEvaluated) {
                        matchesEvaluated = f.evaluated_type && f.evaluated_type.trim() === filterEvaluated;
                    }

                    return matchesSearch && matchesStatus && matchesEvaluator && matchesEvaluated;
                });

                const grid = document.getElementById('formsGrid');

                if (filtered.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-icon">🗂️</div>
                            <p>${allForms.length === 0 ? 'Nenhum formulário ativo no momento.' : 'Nenhum formulário corresponde à sua busca.'}</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = filtered.map(f => {
                    const roles = { 
                        avaliador: f.evaluator_type || 'Não especificado', 
                        avaliado: f.evaluated_type || 'Não especificado' 
                    };

                    const start = f.start_date
                        ? `Abertura: ${new Date(f.start_date).toLocaleString('pt-BR')}`
                        : 'Abertura: Imediata';
                    
                    const deadline = f.deadline 
                        ? `Fechamento: ${new Date(f.deadline).toLocaleString('pt-BR')}`
                        : 'Fechamento: Sem prazo';

                    return `
                        <div class="public-form-card">
                            <div>
                                <div class="form-card-title">${escapeHtml(f.title)}</div>
                                <div style="display: flex; gap: 0.4rem; margin-bottom: 0.75rem; flex-wrap: wrap;">
                                    <span class="badge" style="background-color: rgba(0, 123, 255, 0.08); color: var(--primary); font-size: 0.72rem; padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 600; border: 1px solid rgba(0, 123, 255, 0.15);">
                                        Avaliador: ${escapeHtml(roles.avaliador)}
                                    </span>
                                    <span class="badge" style="background-color: rgba(40, 167, 69, 0.08); color: #28a745; font-size: 0.72rem; padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 600; border: 1px solid rgba(40, 167, 69, 0.15);">
                                        Avaliado: ${escapeHtml(roles.avaliado)}
                                    </span>
                                </div>
                                <div class="form-card-desc">${escapeHtml(f.description || 'Sem descrição.')}</div>
                            </div>
                            <div>
                                <div class="form-card-meta">
                                    <span style="display: flex; align-items: center; gap: 0.4rem; color: var(--text-main); font-weight: 500;">
                                        🛫 ${start}
                                    </span>
                                    <span style="display: flex; align-items: center; gap: 0.4rem; color: var(--text-main); font-weight: 500;">
                                        📅 ${deadline}
                                    </span>
                                </div>
                                <button class="btn btn-primary" style="width: 100%; font-weight: 600; padding: 0.65rem;" onclick="answerForm(${f.id})">
                                    📝 Responder Avaliação
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            window.answerForm = (id) => {
                window.location.href = `/form-view.html?id=${id}`;
            };

            window.logout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.reload();
            };

            function escapeHtml(str) {
                return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            }
        });
    </script>
    <script src="/js/navbar.js"></script>
</body>
</html>
